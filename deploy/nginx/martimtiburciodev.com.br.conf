# Portfólio — martimtiburciodev.com.br
#
# ┌────────────────────────────────────────────────────────────────────────┐
# │ NÃO COPIE ESTE ARQUIVO POR CIMA DO QUE ESTÁ NO SERVIDOR.               │
# │                                                                        │
# │ O certbot reescreveu o arquivo lá para incluir o bloco 443 e o         │
# │ redirect do 80. Sobrescrever apaga isso e derruba o HTTPS. O caminho   │
# │ certo é buscar o arquivo do servidor, aplicar as mudanças em cima,     │
# │ rodar `nginx -t` e só então recarregar — sempre com backup antes.      │
# └────────────────────────────────────────────────────────────────────────┘
#
# Este arquivo é a REFERÊNCIA do que o bloco precisa conter depois que o site
# deixou de ser estático e passou a rodar como processo Node.
#
# IMPORTANTE: este bloco NÃO é `default_server`. A VPS já serve saqualocal.com.br,
# cellyarquivosdigitais.com.br e outros; existe um `000-catch-all.conf` que é o
# `default_server` e devolve 444. Marcar este como padrão sequestraria o
# tráfego dos outros domínios.

# --------------------------------------------------------------------------
# Esta linha vai no bloco `http` (em /etc/nginx/nginx.conf), NÃO aqui dentro.
# Segura tentativa de força bruta no login antes de a requisição chegar ao Node.
#
#   limit_req_zone $binary_remote_addr zone=portfolio_login:1m rate=10r/m;
# --------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name martimtiburciodev.com.br www.martimtiburciodev.com.br;

    access_log /var/log/nginx/martimtiburciodev.access.log;
    error_log  /var/log/nginx/martimtiburciodev.error.log;

    charset utf-8;

    # Fotos até 12 MB (o admin recusa acima disso); o padrão do nginx é 1 MB e
    # cortaria o envio antes de a aplicação sequer ver o arquivo.
    client_max_body_size 15m;

    # As imagens enviadas pelo admin vivem fora da aplicação, para sobreviverem
    # a uma publicação. O nginx entrega direto do disco: o Node nem é acordado.
    location /uploads/ {
        alias /var/www/martimtiburciodev/dados/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;

        # Se o arquivo não existir aqui, deixa a aplicação responder o 404 —
        # ela conhece o conteúdo e o nginx não.
        try_files $uri @aplicacao;
    }

    # Assets com hash no nome: nunca mudam de conteúdo.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Só o login é limitado. `burst=5 nodelay` deixa você errar a senha algumas
    # vezes sem esperar, mas trava um robô que tenta milhares.
    location = /admin/entrar {
        limit_req zone=portfolio_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # As duas linhas abaixo não são enfeite: o Next compara a origem do
        # formulário com o host para barrar CSRF nas Server Actions. Sem elas,
        # todo salvamento do admin falha com "Invalid Server Actions request".
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }

    location @aplicacao {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
