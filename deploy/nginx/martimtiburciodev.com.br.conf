# Portfólio — martimtiburciodev.com.br
#
# IMPORTANTE: este bloco NÃO é `default_server`. A VPS já serve saqualocal.com.br
# e cellyarquivosdigitais.com.br; marcar este como padrão sequestraria o tráfego
# desses domínios. Ele responde apenas pelo server_name abaixo.
#
# Instalação:
#   /etc/nginx/sites-available/martimtiburciodev.com.br.conf
#   ln -s ../sites-available/martimtiburciodev.com.br.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# O HTTPS é adicionado depois, por:
#   certbot --nginx -d martimtiburciodev.com.br -d www.martimtiburciodev.com.br

server {
    listen 80;
    listen [::]:80;
    server_name martimtiburciodev.com.br www.martimtiburciodev.com.br;

    root /var/www/martimtiburciodev/current;
    index index.html;

    access_log /var/log/nginx/martimtiburciodev.access.log;
    error_log  /var/log/nginx/martimtiburciodev.error.log;

    charset utf-8;

    # Site estático: a URL sem barra final também resolve para o index.html
    # da pasta correspondente (gerado pelo trailingSlash do Next).
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;

    # Os assets do Next carregam hash no nome, então nunca mudam de conteúdo.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.ico {
        expires 7d;
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Não expõe arquivos ocultos que por acaso cheguem ao diretório.
    location ~ /\. {
        deny all;
    }
}
