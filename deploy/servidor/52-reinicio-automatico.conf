// Reinício automático quando a atualização exigir.
//
// Instalado em /etc/apt/apt.conf.d/52-reinicio-automatico.conf
//
// O `unattended-upgrades` já rodava nesta máquina e aplicava correção de
// segurança sozinho — mas nunca reiniciava. Resultado: a máquina passou 12
// semanas de pé rodando um kernel antigo, com o novo instalado e esperando.
// Correção de kernel que não reinicia é correção que não existe.
//
// NÃO reinicia toda noite: só quando o próprio sistema criou o
// /var/run/reboot-required, o que acontece raramente (kernel, libc, systemd).

// O apt-daily-upgrade.timer desta máquina roda ~06:52 UTC. O reinício vem
// logo depois, às 04:00 de Brasília — o vale de tráfego da loja da Celly.
Unattended-Upgrade::Automatic-Reboot "true";
Unattended-Upgrade::Automatic-Reboot-Time "07:00";

// Reinicia mesmo com alguém conectado. Às 4h da manhã, uma sessão SSH
// esquecida aberta não é motivo para adiar correção de kernel por semanas —
// que foi exatamente o que aconteceu aqui.
Unattended-Upgrade::Automatic-Reboot-WithUsers "true";

// Guarda o que foi aplicado, para dar para reconstruir o que mudou se algo
// quebrar depois de um reinício de madrugada.
Unattended-Upgrade::MinimalSteps "true";

// Inclui as atualizações comuns, não só as de segurança.
//
// Sem esta linha, os 45 pacotes de `noble-updates` que estavam parados
// continuariam parados para sempre: o padrão do Ubuntu só aplica a origem de
// segurança. Como aqui não vai existir janela de manutenção com alguém
// olhando, a alternativa real não era "aplicar com cuidado depois" — era
// nunca aplicar, e foi assim que a máquina chegou a 12 semanas de atraso.
//
// O preço: correção de bug do Ubuntu entra sem revisão. É um risco pequeno
// numa LTS, mas existe — daí a verificação pós-reinício, que avisa se algum
// serviço não voltou.
Unattended-Upgrade::Allowed-Origins {
    "${distro_id}:${distro_codename}-updates";
};
